name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # cosign keyless signing via OIDC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Compute SOURCE_DATE_EPOCH
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      # keytar needs libsecret on Linux; rpm target needs rpmbuild.
      - name: Linux build deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev rpm

      - name: Install (root lockfile, all workspaces)
        run: npm ci

      - name: Generate SBOM (CycloneDX)
        shell: bash
        run: npm sbom --sbom-format cyclonedx --omit dev > "sbom.${{ matrix.platform }}.cdx.json"

      - name: Build + package client
        shell: bash
        env:
          # Code-signing: only active when secrets are configured.
          # CSC_IDENTITY_AUTO_DISCOVERY=false prevents electron-builder from
          # searching the macOS keychain and failing when no cert is present.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm --workspace client run dist:${{ matrix.platform }} -- --publish never

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with cosign (keyless)
        shell: bash
        run: |
          shopt -s nullglob
          files=( client/dist/*.exe client/dist/*.dmg client/dist/*.zip client/dist/*.AppImage client/dist/*.deb client/dist/*.rpm "sbom.${{ matrix.platform }}.cdx.json" )
          for f in "${files[@]}"; do
            cosign sign-blob --yes --bundle "${f}.sigstore" "$f"
          done

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/*.exe
            client/dist/*.dmg
            client/dist/*.zip
            client/dist/*.AppImage
            client/dist/*.deb
            client/dist/*.rpm
            client/dist/*.sigstore
            sbom.${{ matrix.platform }}.cdx.json
            sbom.${{ matrix.platform }}.cdx.json.sigstore
          fail_on_unmatched_files: false
