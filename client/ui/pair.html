<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pair RemoteConnectMe</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0b1020; color: #e7ecf6; margin: 0; padding: 40px 32px; }
    h1 { margin-top: 0; font-size: 22px; }
    p { color: rgba(231,236,246,0.7); line-height: 1.6; }
    button { margin-top: 24px; width: 100%; padding: 14px; border-radius: 8px; border: 0; background: #2a6df4; color: white; font-weight: 600; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .err { color: #fca5a5; font-size: 14px; margin-top: 12px; }
    .waiting { color: rgba(231,236,246,0.6); font-size: 14px; margin-top: 16px; text-align: center; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Pair this PC</h1>
  <p>Sign in to your RemoteConnectMe account in the browser window that opens. Once signed in, click <b>Pair this device</b> to link this PC to your account.</p>

  <button id="go">Sign in to pair this PC</button>
  <div id="msg"></div>

  <script>
    const go  = document.getElementById('go');
    const msg = document.getElementById('msg');

    go.addEventListener('click', async () => {
      go.disabled = true;
      msg.innerHTML = '<div class="waiting"><span class="spinner"></span>Waiting for browser sign-in…</div>';
      try {
        await window.remotely.browserPair();
        // main.js will close this window and open the status window on success
      } catch (e) {
        msg.className = 'err';
        msg.textContent = e.message || String(e);
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
